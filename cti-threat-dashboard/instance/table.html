<!DOCTYPE html>
<html>

<head>
<title>Scan Database</title>
</head>

<body>

<h2>Stored IP Scan Data</h2>

<table border="1">

<tr>
<th>ID</th>
<th>IP Address</th>
<th>Score</th>
<th>Country</th>
<th>Tag</th>
</tr>

{% for s in scans %}

<tr>
<td>{{ s.id }}</td>
<td>{{ s.ip }}</td>
<td>{{ s.score }}</td>
<td>{{ s.country }}</td>
<td>{{ s.tag }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>

</html>
