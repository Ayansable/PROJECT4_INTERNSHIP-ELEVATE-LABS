<!DOCTYPE html>
<html>

<head>

<title>CTI Dashboard</title>

<style>

body{
background:#0a192f;
font-family:Arial;
color:white;
margin:0;
padding:0;
}

h1{
text-align:center;
padding-top:30px;
}

.cards{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.card{
width:220px;
padding:25px;
border-radius:10px;
text-align:center;
font-size:20px;
}

.total{
background:#374151;
}

.malicious{
background:#ef4444;
}

.safe{
background:#16a34a;
}

table{
width:80%;
margin:auto;
margin-top:50px;
border-collapse:collapse;
}

th{
background:#1e293b;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #374151;
}

.status-safe{
color:#22c55e;
font-weight:bold;
}

.status-malicious{
color:red;
font-weight:bold;
}

.back{
text-align:center;
margin-top:40px;
}

a{
color:#60a5fa;
}

</style>

</head>

<body>

<h1>Cyber Threat Intelligence Dashboard</h1>

<div class="cards">

<div class="card total">
<h3>Total Scans</h3>
<h2>{{total}}</h2>
</div>

<div class="card malicious">
<h3>Malicious IPs</h3>
<h2>{{malicious}}</h2>
</div>

<div class="card safe">
<h3>Safe IPs</h3>
<h2>{{safe}}</h2>
</div>

</div>


<table>

<tr>
<th>IP Address</th>
<th>Country</th>
<th>ISP</th>
<th>Status</th>
</tr>

{% for s in scans %}

<tr>

<td>{{s.ip}}</td>
<td>{{s.country}}</td>
<td>{{s.isp}}</td>

<td>

{% if s.status == "Malicious" %}

<span class="status-malicious">🚨 Malicious</span>

{% else %}

<span class="status-safe">✔ Safe</span>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

<div class="back">

<a href="/">Back Home</a>

</div>

</body>
</html>
