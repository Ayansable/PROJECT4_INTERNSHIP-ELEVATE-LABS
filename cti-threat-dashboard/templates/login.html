<!DOCTYPE html>
<html>

<head>

<style>

body{
background:#0a192f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

.card{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<div class="card">

<h2>Admin Login</h2>

<form action="/login" method="POST">

<input name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button>Login</button>

</form>

</div>

</body>

</html>
